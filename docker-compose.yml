version: '3.8'
services:
  backend:
    build: ./backend
    ports:
      - "8100:8000"
    env_file: .env
    environment:
      - PAYER_AGENT_URL=http://payer-agent:8200
    depends_on:
      postgres:
        condition: service_healthy
      payer-agent:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  mcp-server:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    env_file: .env
    command: python -m app.mcp_server.server

  payer-agent:
    build:
      context: ./payer_agent
      dockerfile: Dockerfile
    ports:
      - "8200:8200"
    env_file: .env
    environment:
      - PAYER_AGENT_URL=http://payer-agent:8200
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8200/.well-known/agent.json || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build: ./frontend
    ports:
      - "3100:80"
    depends_on:
      - backend

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: healthprior
      POSTGRES_USER: healthprior
      POSTGRES_PASSWORD: healthprior_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healthprior"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
