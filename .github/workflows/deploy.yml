name: CI/CD — HealthPrior

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: docker.io
  BACKEND_IMAGE: stpunk47/healthprior-backend
  FRONTEND_IMAGE: stpunk47/healthprior-frontend
  PAYER_AGENT_IMAGE: stpunk47/healthprior-payer-agent

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: healthprior_test
          POSTGRES_USER: healthprior
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: cd backend && pip install -r requirements.txt

      - name: Audit backend dependencies
        run: pip install pip-audit && cd backend && pip-audit -r requirements.txt

      - name: Audit frontend dependencies
        run: |
          cd frontend
          npm ci --ignore-scripts
          npm audit --audit-level=high

      - name: Run tests
        env:
          TESTING: "true"
          DATABASE_URL: postgresql+asyncpg://healthprior:testpass@localhost:5432/healthprior_test
          OPENROUTER_API_KEY: test_key
          SESSION_SECRET_KEY: test-session-secret-key-32chars!!
          ADMIN_GITHUB_EMAIL: test@example.com
          ADMIN_GITHUB_LOGIN: test-admin
          GITHUB_OAUTH_CLIENT_ID: test_client_id
          GITHUB_OAUTH_CLIENT_SECRET: test_client_secret
        run: cd backend && pytest tests/ -v

  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: type=sha,prefix=sha-,format=short

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.version }}
            ${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.version }}
            ${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push payer-agent
        uses: docker/build-push-action@v5
        with:
          context: ./payer_agent
          push: true
          tags: |
            ${{ env.PAYER_AGENT_IMAGE }}:${{ steps.meta.outputs.version }}
            ${{ env.PAYER_AGENT_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Add VPS to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Copy compose file to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: docker-compose.prod.yml
          target: /opt/healthprior/

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: IMAGE_TAG
          script: |
            cd /opt/healthprior
            export IMAGE_TAG=${{ needs.build.outputs.image_tag }}
            echo "Deploying tag: $IMAGE_TAG"

            # Login to Docker Hub
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            # Pull new images
            # Note: healthprior-mcp reuses the backend image — pulling backend covers it
            docker pull stpunk47/healthprior-backend:$IMAGE_TAG
            docker pull stpunk47/healthprior-frontend:$IMAGE_TAG
            docker pull stpunk47/healthprior-payer-agent:$IMAGE_TAG

            # Update .env with IMAGE_TAG and ADMIN_GITHUB_LOGIN
            sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=$IMAGE_TAG/" .env || echo "IMAGE_TAG=$IMAGE_TAG" >> .env
            sed -i "s/^ADMIN_GITHUB_LOGIN=.*/ADMIN_GITHUB_LOGIN=${{ secrets.ADMIN_USER }}/" .env || echo "ADMIN_GITHUB_LOGIN=${{ secrets.ADMIN_USER }}" >> .env

            # Start all services (backend, mcp-server, frontend, payer-agent, postgres)
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Reload nginx
            sudo nginx -t && sudo nginx -s reload

            # Health checks — fail the deploy if any service doesn't come up
            echo "Running health checks..."

            wait_healthy() {
              local name=$1 url=$2 max=$3
              for i in $(seq 1 $max); do
                if curl -sf "$url" > /dev/null 2>&1; then
                  echo "$name healthy"
                  return 0
                fi
                echo "Waiting for $name... attempt $i/$max"
                sleep 3
              done
              echo "ERROR: $name failed to become healthy" >&2
              exit 1
            }

            wait_healthy "backend"     http://localhost:8100/health                  30
            wait_healthy "mcp-server"  http://localhost:8001/health                  20
            wait_healthy "payer-agent" http://localhost:8200/.well-known/agent.json  20

            echo "Deployment complete"
