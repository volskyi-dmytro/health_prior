name: CI/CD — HealthPrior

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: docker.io
  BACKEND_IMAGE: stpunk47/healthprior-backend
  MCP_IMAGE: stpunk47/healthprior-mcp
  FRONTEND_IMAGE: stpunk47/healthprior-frontend

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: healthprior_test
          POSTGRES_USER: healthprior
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: cd backend && pip install -r requirements.txt

      - name: Run tests
        env:
          TESTING: "true"
          DATABASE_URL: postgresql+asyncpg://healthprior:testpass@localhost:5432/healthprior_test
          OPENROUTER_API_KEY: test_key
        run: cd backend && pytest tests/ -v

  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: type=sha,prefix=sha-,format=short

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.version }}
            ${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push MCP server
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.MCP_IMAGE }}:${{ steps.meta.outputs.version }}
            ${{ env.MCP_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.version }}
            ${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Add VPS to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: IMAGE_TAG
          script: |
            cd /opt/healthprior
            export IMAGE_TAG=${{ needs.build.outputs.image_tag }}
            echo "Deploying tag: $IMAGE_TAG"

            # Login to Docker Hub
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            # Pull new images
            docker pull stpunk47/healthprior-backend:$IMAGE_TAG
            docker pull stpunk47/healthprior-mcp:$IMAGE_TAG
            docker pull stpunk47/healthprior-frontend:$IMAGE_TAG

            # Update .env IMAGE_TAG
            sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=$IMAGE_TAG/" .env || echo "IMAGE_TAG=$IMAGE_TAG" >> .env

            # Restart services
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Reload nginx
            sudo nginx -t && sudo nginx -s reload

            # Health checks
            echo "Running health checks..."
            for i in $(seq 1 30); do
              if curl -sf http://localhost:8100/health > /dev/null 2>&1; then
                echo "Backend healthy"
                break
              fi
              echo "Waiting for backend... attempt $i"
              sleep 3
            done

            for i in $(seq 1 20); do
              if curl -sf http://localhost:8001/health > /dev/null 2>&1; then
                echo "MCP server healthy"
                break
              fi
              sleep 3
            done

            echo "Deployment complete"
