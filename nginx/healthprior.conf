server {
    listen 80;
    server_name healthprior.volskyi-dmytro.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name healthprior.volskyi-dmytro.com;

    ssl_certificate     /etc/ssl/cloudflare/volskyi-dmytro.com.pem;
    ssl_certificate_key /etc/ssl/cloudflare/volskyi-dmytro.com.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Backend API — strip /api prefix before forwarding
    location /api/ {
        proxy_pass http://127.0.0.1:8100/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # MCP Server (exposed for demo inspection)
    # FastMCP registers at /mcp/ internally; nginx strips the /mcp/ prefix, so
    # external /mcp/mcp (no trailing slash) lands on /mcp which FastMCP 307s.
    # Use 308 (preserves POST) to canonicalize the path before proxying.
    location = /mcp/mcp {
        return 308 /mcp/mcp/;
    }
    location /mcp/ {
        proxy_pass http://127.0.0.1:8001/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Frontend (catch-all SPA)
    location / {
        proxy_pass http://127.0.0.1:3100/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
